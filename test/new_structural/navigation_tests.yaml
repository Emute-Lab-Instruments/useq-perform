  actions: right
  new_selection: "*"

- name: "right continues through nested list"
  code: "(+ 1 (* 2 3))"
  selection: "*"
  actions: [right, right]
  new_selection: "3"

- name: "right exits nested list automatically"
  code: "(+ 1 (* 2 3))"
  selection: "3"
  actions: right
  new_selection: "(* 2 3)"

- name: "right exits to parent level"
  code: "(+ 1 (* 2 3))"
  selection: "(* 2 3)"
  actions: [right, right, right, right]
  new_selection: "(+ 1 (* 2 3))"

- name: "in explicitly enters nested list"
  code: "(+ 1 (* 2 3))"
  selection: "(+ 1 (* 2 3))"
  actions: in
  new_selection: "+"

- name: "out explicitly exits nested list"
  code: "(+ 1 (* 2 3))"
  selection: "*"
  actions: out
  new_selection: "(* 2 3)"

- name: "out exits multiple levels explicitly"
  code: "(+ 1 (* 2 3))"
  selection: "*"
  actions: [out, out]
  new_selection: "(+ 1 (* 2 3))"

- name: "left spatially exits and continues"
  code: "(+ 1 (* 2 3))"
  selection: "*"
  actions: left
  new_selection: "(* 2 3)"

- name: "left moves to previous at same level"
  code: "(+ 1 (* 2 3))"
  selection: "(* 2 3)"
  actions: left
  new_selection: "1"

- name: "previous stays at level, does not exit"
  code: "(+ 1 (* 2 3))"
  selection: "*"
  actions: previous
  new_selection: "*"

