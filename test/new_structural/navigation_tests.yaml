# Structural Code Editor Navigation Test Cases for Clojure

# NAVIGATION SEMANTICS:
# - next/previous: Move between siblings at the SAME LEVEL only (stops at boundaries)
# - right/left: Spatial/hybrid navigation (enters/exits expressions automatically)
# - in/out: Explicit level changes
# - up/down: Vertical navigation maintaining level

# Basic symbol navigation - NEXT/PREVIOUS (same level)
- name: "next symbol - simple"
  code: "hello world"
  selection: "hello"
  actions: next
  new_selection: "world"

- name: "previous symbol - simple"
  code: "hello world"
  selection: "world"
  actions: previous
  new_selection: "hello"

- name: "next symbol - multiple symbols"
  code: "foo bar baz"
  selection: "bar"
  actions: next
  new_selection: "baz"

- name: "previous symbol - multiple symbols"
  code: "foo bar baz"
  selection: "bar"
  actions: previous
  new_selection: "foo"

- name: "next stops at level boundary"
  code: "(+ 1 (* 2 3))"
  selection: "(* 2 3)"
  actions: next
  new_selection: "(* 2 3)"

- name: "next within list - stays at same level"
  code: "(+ 1 (* 2 3))"
  selection: "+"
  actions: [next, next, next]
  new_selection: "(* 2 3)"

- name: "previous stops at level boundary"
  code: "(+ 1 (* 2 3))"
  selection: "+"
  actions: previous
  new_selection: "+"

# Basic symbol navigation - RIGHT/LEFT (spatial)
- name: "right moves spatially through nested structure"
  code: "(+ 1 (* 2 3)) hello"
  selection: "+"
  actions: [right, right, right, right, right, right, right, right]
  new_selection: "hello"

- name: "right enters nested expression"
  code: "(+ 1 (* 2 3))"
  selection: "(* 2 3)"
  actions: right
  new_selection: "*"

- name: "right exits at end of nested expression"
  code: "(+ 1 (* 2 3))"
  selection: "3"
  actions: right
  new_selection: "(* 2 3)"

- name: "right continues to parent expression"
  code: "(+ 1 (* 2 3))"
  selection: "(* 2 3)"
  actions: [right, right, right, right]
  new_selection: "(+ 1 (* 2 3))"

- name: "left moves spatially backward"
  code: "(+ 1 (* 2 3)) hello"
  selection: "hello"
  actions: [left, left, left, left, left, left, left, left]
  new_selection: "+"

- name: "left exits then moves to previous"
  code: "(+ 1 (* 2 3))"
  selection: "*"
  actions: left
  new_selection: "(* 2 3)"

# Entering and exiting lists explicitly
- name: "enter list with 'in'"
  code: "(hello world)"
  selection: "(hello world)"
  actions: in
  new_selection: "hello"

- name: "exit list with 'out'"
  code: "(hello world)"
  selection: "hello"
  actions: out
  new_selection: "(hello world)"

- name: "right enters list from outside"
  code: "(hello world)"
  selection: "(hello world)"
  actions: right
  new_selection: "hello"

- name: "left exits list at first element"
  code: "(hello world)"
  selection: "hello"
  actions: left
  new_selection: "(hello world)"

# Vertical navigation
- name: "down to next line"
  code: "foo\nbar"
  selection: "foo"
  actions: down
  new_selection: "bar"

- name: "up to previous line"
  code: "foo\nbar"
  selection: "bar"
  actions: up
  new_selection: "foo"

- name: "down maintains level - lists"
  code: "(foo)\n(bar)"
  selection: "(foo)"
  actions: down
  new_selection: "(bar)"

- name: "down maintains level - symbols"
  code: "(foo)\n(bar)"
  selection: "foo"
  actions: down
  new_selection: "bar"

- name: "up maintains level - lists"
  code: "(foo)\n(bar)"
  selection: "(bar)"
  actions: up
  new_selection: "(foo)"

- name: "up maintains level - symbols"
  code: "(foo)\n(bar)"
  selection: "bar"
  actions: up
  new_selection: "foo"

# Nested list navigation - comparing NEXT vs RIGHT
- name: "next within nested list - stops at boundary"
  code: "(+ 1 (* 2 3))"
