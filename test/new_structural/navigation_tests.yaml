# Threading macros - NEXT vs RIGHT
- name: "navigate thread-first with next"
  code: "(-> x (foo) (bar))"
  selection: "(-> x (foo) (bar))"
  actions: [in, next, next, next]
  new_selection: "(bar)"

- name: "navigate thread-first with right"
  code: "(-> x (foo) (bar))"
  selection: "(-> x (foo) (bar))"
  actions: [right, right, right, right]
  new_selection: "(foo)"

- name: "next treats threaded forms as units"
  code: "(-> x (foo 1) (bar 2))"
  selection: "(foo 1)"
  actions: next
  new_selection: "(bar 2)"

- name: "right enters threaded forms"
  code: "(-> x (foo 1) (bar 2))"
  selection: "(foo 1)"
  actions: right
  new_selection: "foo"

- name: "navigate thread-last with next"
  code: "(->> data (map inc) (filter even?))"
  selection: "data"
  actions: [next, next]
  new_selection: "(filter even?)"

- name: "right spatial through thread-last"
  code: "(->> data (map inc) (filter even?))"
  selection: "data"
  actions: [right, right, right, right]
  new_selection: "inc"

