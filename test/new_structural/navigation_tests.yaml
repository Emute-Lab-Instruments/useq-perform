# Complex nested structures - demonstrating NEXT vs RIGHT
- name: "deeply nested - next stays at each level"
  code: "(a (b (c d)))"
  selection: "(a (b (c d)))"
  actions: [in, next]
  new_selection: "(b (c d))"

- name: "deeply nested - next stops at boundary"
  code: "(a (b (c d)))"
  selection: "(b (c d))"
  actions: next
  new_selection: "(b (c d))"

- name: "deeply nested - right continues spatially"
  code: "(a (b (c d)))"
  selection: "(b (c d))"
  actions: [right, right, right, right, right]
  new_selection: "(b (c d))"

- name: "deeply nested - right traverses full depth"
  code: "(a (b (c d)))"
  selection: "a"
  actions: [right, right, right, right, right, right]
  new_selection: "(a (b (c d)))"

- name: "deeply nested - in goes one level only"
  code: "(a (b (c d)))"
  selection: "(b (c d))"
  actions: in
  new_selection: "b"

- name: "mixed structures - next respects boundaries"
  code: "(foo [1 2] {:a 3})"
  selection: "[1 2]"
  actions: next
  new_selection: "{:a 3}"

- name: "mixed structures - right enters all"
  code: "(foo [1 2] {:a 3})"
  selection: "[1 2]"
  actions: [right, right, right]
  new_selection: "{:a 3}"

- name: "mixed structures - right full traversal"
  code: "(foo [1 2] {:a 3})"
  selection: "foo"
  actions: [right, right, right, right, right, right, right, right, right]
  new_selection: "(foo [1 2] {:a 3})"

# Complete spatial traversal examples
- name: "right full spatial traversal from start"
  code: "((a b) (c d))"
  selection: "((a b) (c d))"
  actions: [right, right, right, right, right, right, right, right]
  new_selection: "((a b) (c d))"

- name: "left full spatial traversal from end"
  code: "((a b) (c d)) e"
  selection: "e"
  actions: [left, left, left, left, left, left, left, left, left]
  new_selection: "a"

- name: "spatial traversal with multiple nesting"
  code: "(+ (* 2 3) (- 5 1))"
  selection: "+"
  actions: [right, right, right, right, right, right, right, right, right, right]
  new_selection: "(+ (* 2 3) (- 5 1))"

# Edge cases - boundary behavior
- name: "next at end of list stays"
  code: "(a b c)"
  selection: "c"
  actions: next
  new_selection: "c"

- name: "previous at start of list stays"
  code: "(a b c)"
  selection: "a"
  actions: previous
  new_selection: "a"

- name: "right at end moves to parent"
  code: "(a b c)"
  selection: "c"
  actions: right
  new_selection: "(a b c)"

- name: "left at start moves to parent"
  code: "(a b c)"
  selection: "a"
  actions: left
  new_selection: "(a b c)"

- name: "right at top level with next expression"
  code: "(a b) (c d)"
  selection: "(a b)"
  actions: [right, right, right, right]
  new_selection: "(c d)"

- name: "next at top level between expressions"
  code: "(a b) (c d)"
  selection: "(a b)"
  actions: next
  new_selection: "(c d)"

