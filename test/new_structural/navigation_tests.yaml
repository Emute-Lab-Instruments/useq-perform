- name: "treat string as atomic with next - stops at boundary"
  code: '(println "hello world")'
  selection: '"hello world"'
  actions: next
  new_selection: '"hello world"'

- name: "navigate to string with next"
  code: '(println "hello world")'
  selection: "println"
  actions: next
  new_selection: '"hello world"'

- name: "right from string exits to parent expression"
  code: '(println "hello world")'
  selection: '"hello world"'
  actions: right
  new_selection: '(println "hello world")'

