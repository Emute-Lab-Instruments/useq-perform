# Function definitions - NEXT vs RIGHT
- name: "navigate defn with next"
  code: "(defn foo [x] (+ x 1))"
  selection: "(defn foo [x] (+ x 1))"
  actions: [in, next, next, next]
  new_selection: "(+ x 1)"

- name: "navigate defn with right"
  code: "(defn foo [x] (+ x 1))"
  selection: "(defn foo [x] (+ x 1))"
  actions: [right, right, right, right]
  new_selection: "[x]"

- name: "next treats arg vector as unit"
  code: "(defn foo [x y] (+ x y))"
  selection: "foo"
  actions: next
  new_selection: "[x y]"

- name: "right enters arg vector"
  code: "(defn foo [x y] (+ x y))"
  selection: "[x y]"
  actions: right
  new_selection: "x"

- name: "navigate into function body with next"
  code: "(defn foo [x] (+ x (* 2 3)))"
  selection: "[x]"
  actions: next
  new_selection: "(+ x (* 2 3))"

- name: "navigate to nested expr in body - next stops"
  code: "(defn foo [x] (+ x (* 2 3)))"
  selection: "(+ x (* 2 3))"
  actions: [in, next, next]
  new_selection: "(* 2 3)"

- name: "navigate to nested expr in body - right continues"
  code: "(defn foo [x] (+ x (* 2 3)))"
  selection: "(+ x (* 2 3))"
  actions: [right, right, right]
  new_selection: "(* 2 3)"

